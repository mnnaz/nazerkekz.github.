<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ВСЕ ЧТО Я ЛЮБЛЮ</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    min-height:100vh;
    background-image: url("assets/г1.jpeg");
    background-size: cover;
    background-position: center;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    font-family: 'Pacifico', cursive;
}

/* затемнение всего фона */
.overlay{
    width:100%;
    min-height:100vh;
    background: rgba(0,0,0,0.55);
    display:flex;
    justify-content:center;
}

/* блок заголовка */
.title-box{
    margin-top:60px;
    background-image: url("assets/г1.jpeg");
    background-size: cover;
    background-position: center;
    padding:40px 60px;
    border-radius:30px;
    position:relative;
    box-shadow:0 0 30px rgba(0,0,0,0.8);
}

/* прозрачный слой поверх картинки */
.title-box::before{
    content:"";
    position:absolute;
    inset:0;
    background: rgba(0,0,0,0.4);
    border-radius:30px;
}

/* текст */
h1{
    position:relative;
    color:white;
    font-size:48px;
    margin:0;
    text-align:center;
}

</style>
</head>

<body>

<div class="overlay">
    <div class="title-box">
        <h1>ВСЕ ЧТО Я ЛЮБЛЮ ❤️❤️❤️</h1>
    </div>
</div>

</body>
</html>
