<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Наша любовь 💕</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;

      background: url("assets/WhatsApp Image 2026-04-17 at 14.06.21.jpeg") no-repeat center/cover;
    }

    .overlay {
      padding: 40px;
      border-radius: 20px;
      color: white;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      z-index: 2;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 85px;
      margin-bottom: 10px;

      animation: fadeIn 2s ease;

      text-shadow: 
        0 0 10px rgba(255,255,255,0.9),
        0 0 20px pink;
    }

    p {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      animation: fadeIn 3s ease;
    }

    /* 💫 появление */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 💗 пульсация */
    .pulse {
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* 💖 сердечки */
    .heart {
      position: absolute;
      bottom: -20px;
      color: pink;
      font-size: 20px;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0);
        opacity: 1;
      }
      to {
        transform: translateY(-110vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<div class="overlay">
  <h1 class="pulse">Султанчик-llovvvveeeee 💖</h1>
  <p>Сайт қалай,Ереке? 🥹</p>
</div>

<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💗";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Для тебя 💖</title>

  <!-- Романтичный шрифт -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffe6f0, #fff5f8);
      font-family: 'Montserrat', sans-serif;
    }

    .card {
      text-align: center;
      background: rgba(255, 255, 255, 0.7);
      padding: 50px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      backdrop-filter: blur(8px);
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      color: #d63384;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      color: #555;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    button {
      padding: 12px 30px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    .yes {
      background: #ff4d88;
      color: white;
    }

    .yes:hover {
      background: #e6005c;
      transform: scale(1.05);
    }

    .no {
      background: #f1f1f1;
      color: #333;
    }

    .no:hover {
      background: #ddd;
      transform: scale(1.05);
    }

    .result {
      margin-top: 25px;
      font-size: 22px;
      color: #d63384;
      display: none;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Скажи мне…</h1>
    <p>Любишь ли ты меня? 💗</p>

    <div class="buttons">
      <button class="yes" onclick="answer(true)">Да 💖</button>
      <button class="no" onclick="answer(false)">Нет 💔</button>
    </div>

    <div class="result" id="result"></div>
  </div>

  <script>
    function answer(isYes) {
      const result = document.getElementById("result");

      if (isYes) {
        result.innerHTML = "Я знала… 💞<br>Я тоже тебя люблю.";
      } else {
        result.innerHTML = "…💔<br>Я всё равно буду тебя любить.";
      }

      result.style.display = "block";
    }
  </script>
</body>
</html>
