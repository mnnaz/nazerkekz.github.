<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ВСЕ ЧТО Я ЛЮБЛЮ</title>

<!-- Романтичный шрифт -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:#0b0b0b;
    font-family: 'Great Vibes', cursive;
}

/* ===== ВЕРХНИЙ БЛОК ===== */

.hero{
    width:100%;
    height:75vh;
    background-image: url("assets/г5.jpeg");
    background-size: cover;
    background-position: center top;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background: rgba(0,0,0,0.25);
}

.title{
    position:relative;
    font-size:52px;
    color:#fff0f6;
    letter-spacing:4px;
    text-shadow:
      0 0 8px #ffb6d9,
      0 0 15px #ff8fc7,
      0 0 30px #ff69b4;
}

/* ===== НИЖНИЙ БЛОК ===== */

.bottom{
    padding:80px 20px;
    text-align:center;
}

.love-text{
    font-size:46px;
    color:#ffe6f2;
    margin-bottom:40px;
    letter-spacing:3px;
    text-shadow:
      0 0 8px #ff9ad5,
      0 0 16px #ff69b4;
}

.bottom img{
    width:260px;
    border-radius:25px;
    box-shadow:
      0 0 15px rgba(255,105,180,0.6),
      0 0 35px rgba(255,105,180,0.4);
}

</style>
</head>

<body>

<!-- ВЕРХ -->
<div class="hero">
    <div class="title">❤️ ВСЕ ЧТО Я ЛЮБЛЮ ❤️</div>
</div>

<!-- НИЗ -->
<div class="bottom">
    <div class="love-text">
        ❤️ ЕҢ БІРІНШІ - СЕН 🫵🏻 Султанчик ❤️
    </div>

    <img src="assets/6.jpeg" alt="love photo">
</div>

</body>
</html>
