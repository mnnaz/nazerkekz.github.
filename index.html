<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Все что я люблю</title>

<!-- Красивый шрифт -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    min-height:100vh;
    background-image: url("background.jpg");
    background-size: cover;
    background-position: center;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: 'Montserrat', sans-serif;
}

/* Затемнение фона */
.overlay{
    background: rgba(0,0,0,0.55);
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Карточка */
.card{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border-radius:25px;
    padding:40px;
    text-align:center;
    color:white;
    width:320px;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

/* Заголовок */
h1{
    font-family: 'Pacifico', cursive;
    font-size:38px;
    margin-bottom:20px;
}

/* Фото */
img{
    width:200px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 0 15px rgba(255,0,0,0.7);
}

/* Текст */
p{
    font-size:18px;
    line-height:1.6;
}

/* Сердца */
.hearts{
    font-size:24px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="overlay">
  <div class="card">

    <h1>ВСЁ ЧТО Я ЛЮБЛЮ ❤️❤️❤️</h1>

    <!-- ТВОЕ ФОТО -->
    <img src="pp.png" alt="me">

    <p>
      Музыка 🎵<br>
      Игры 🎮<br>
      Друзья 🧑‍🤝‍🧑<br>
      Котики 🐱<br>
      Ночь 🌙
    </p>

    <div class="hearts">
      ❤️ 💖 💕 💞 💗 ❤️
    </div>

  </div>
</div>

</body>
</html>
