<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Наша любовь 💕</title>

  <!-- очень романтичный шрифт -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;

      background: url("assets/WhatsApp Image 2026-04-17 at 14.06.21.jpeg") no-repeat center/cover;
    }

    .overlay {
      padding: 40px;
      border-radius: 20px;
      color: white;

      /* светлый нежный фон вместо чёрного */
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 85px;
      margin-bottom: 10px;

      /* нежное свечение */
      color: #fff;
      text-shadow: 
        0 0 10px rgba(255,255,255,0.8),
        0 0 20px rgba(255,182,193,0.8),
        0 0 30px rgba(255,105,180,0.6);
    }

    p {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      margin-top: 10px;
      color: #fff;
      text-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

  <div class="overlay">
    <h1>Султанчик, ты — моё всё 💖</h1>
    <p>сайт қалай? 🥹</p>
  </div>

</body>
</html>
