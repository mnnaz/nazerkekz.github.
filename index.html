<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Наша любовь 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
  background: url("assets/WhatsApp Image 2026-04-17 at 14.06.21.jpeg") no-repeat center/cover;
}

/* 💖 главный блок */
.overlay {
  padding: 40px;
  border-radius: 25px;
  color: white;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  text-align: center;
  width: fit-content;
  margin: 80px auto;
}

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 80px;
  text-shadow: 0 0 20px pink;
}

button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 30px;
  font-size: 18px;
  cursor: pointer;
}

.yes {
  background: #ff4d88;
  color: white;
}

.no {
  background: white;
  color: #ff4d88;
}

#result {
  margin-top: 15px;
  font-size: 22px;
  font-family: 'Great Vibes', cursive;
  color: pink;
}

/* 💍 финальный экран */
#loveScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  color: white;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 9999;
  font-size: 40px;
  font-family: 'Great Vibes', cursive;
  text-shadow: 0 0 25px pink;
}

/* 💥 фейерверк */
.firework {
  position: fixed;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: pink;
  animation: explode 1s ease-out forwards;
  z-index: 9998;
}

@keyframes explode {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(25); opacity: 0; }
}

/* 💗 сердечки */
.heart {
  position: absolute;
  bottom: -20px;
  font-size: 20px;
  color: pink;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-110vh); opacity: 0; }
}

/* 📸 ФОТО БЛОК (ПОЧИНЕННЫЙ) */
.photo-card {
  width: 320px;
  margin: 80px auto;
  text-align: center;

  padding: 25px;
  border-radius: 25px;

  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);

  box-shadow: 0 0 25px rgba(255,192,203,0.3);
}

.photo-card h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 40px;
  color: white;
  text-shadow: 0 0 20px pink;
}

.photo-card img {
  width: 100%;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(255,192,203,0.6);
  transition: 0.3s;
}

.photo-card img:hover {
  transform: scale(1.05);
}

</style>
</head>

<body>

<!-- 💖 ОСНОВА -->
<div class="overlay">

  <h1>Султанчик-lllooovveeeee💖</h1>
  <p>do u want me, bbaaabbeeeee? 🥹</p>

  <button class="yes" onclick="yesLove()">Да 💖</button>
  <button class="no" onmouseover="runAway(this)">Нет 💔</button>

  <p id="result"></p>
</div>

<!-- 💍 ФИНАЛ -->
<div id="loveScreen">
  білем ғой сенің оооо иииесссс дейтініңді 💖
</div>

<!-- 📸 ФОТО БЛОК -->
<div class="photo-card">
  <h1>всегда мне говори дададаааа 💖</h1>
  <img src="assets/36.jpeg">
</div>

<!-- 🎵 МУЗЫКА -->
<div style="display:none;">
  <iframe 
    id="music"
    width="0"
    height="0"
    src="https://www.youtube.com/embed/lUz4R5rNzsU?autoplay=1&loop=1&playlist=lUz4R5rNzsU"
    allow="autoplay">
  </iframe>
</div>

<script>

function yesLove() {
  document.getElementById("loveScreen").style.display = "flex";
  document.getElementById("result").innerHTML = "💖 теперь мы вместе 💖";
  startFireworks();

  const music = document.getElementById("music");
  music.src = music.src;
}

/* 💔 убегающая кнопка */
function runAway(btn) {
  btn.style.position = "absolute";
  btn.style.left = Math.random() * 80 + "vw";
  btn.style.top = Math.random() * 80 + "vh";
}

/* 💗 сердечки */
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💗";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 200);

/* 💥 фейерверк */
function startFireworks() {
  for (let i = 0; i < 60; i++) {
    const fw = document.createElement("div");
    fw.className = "firework";

    fw.style.left = Math.random() * 100 + "vw";
    fw.style.top = Math.random() * 100 + "vh";

    document.body.appendChild(fw);

    setTimeout(() => fw.remove(), 1000);
  }
}

</script>

</body>
</html>
