<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ВСЕ ЧТО Я ЛЮБЛЮ</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family: 'Pacifico', cursive;
}

/* блок с картинкой */
.hero{
    width:100%;
    height:100vh;
    background-image: url("assets/г1.jpeg");
    background-size: cover;
    background-position: center;
    position: relative;
}

/* лёгкое затемнение */
.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background: rgba(0,0,0,0.35);
}

/* текст поверх */
.title{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:56px;
    z-index:1;
    text-align:center;
}

</style>
</head>

<body>

<div class="hero">
    <div class="title">ВСЕ ЧТО Я ЛЮБЛЮ ❤️❤️</div>
</div>

</body>
</html>
