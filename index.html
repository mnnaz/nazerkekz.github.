<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Наша любовь 💕</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;

  background: url("assets/WhatsApp Image 2026-04-17 at 14.06.21.jpeg") no-repeat center/cover;
}

/* карточка */
.box {
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(8px);
  color: white;
  transition: 0.3s;
}

/* заголовок */
h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 70px;
}

/* кнопки */
button {
  margin: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-size: 16px;
}

/* 💖 разные состояния */
.love {
  background: pink;
  color: white;
}

.no {
  background: white;
  color: pink;
}

/* скрытый текст */
#secret {
  display: none;
  margin-top: 15px;
  font-size: 18px;
}

/* 💗 сердечки */
.heart {
  position: absolute;
  font-size: 20px;
  animation: float 4s linear forwards;
}

@keyframes float {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-120vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="box">
  <h1>do u want me? 💖</h1>

  <button class="love" onclick="yes()">Да 🥹</button>
  <button class="no" onclick="no()">Нет 😈</button>

  <div id="secret">білем ғой мен иесссс екенін 😏💗</div>
</div>

<script>
function yes() {
  document.getElementById("secret").style.display = "block";
  spawnHearts();
}

function no() {
  alert("Не обманывай 😭💔");
}

/* 💗 сердечки */
function spawnHearts() {
  setInterval(() => {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💗";
    h.style.left = Math.random() * 100 + "vw";
    h.style.top = "100vh";
    document.body.appendChild(h);

    setTimeout(() => h.remove(), 4000);
  }, 200);
}
</script>

</body>
</html>
