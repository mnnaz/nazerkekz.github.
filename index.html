<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Наша любовь 💕</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;

      background: url("assets/WhatsApp Image 2026-04-17 at 14.06.21.jpeg") no-repeat center/cover;
    }

    .overlay {
      padding: 40px;
      border-radius: 20px;
      color: white;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 85px;
      margin-bottom: 10px;
      animation: fadeIn 2s ease;
      text-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 20px pink;
    }

    p {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      animation: fadeIn 3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .pulse {
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .heart {
      position: absolute;
      bottom: -20px;
      color: pink;
      font-size: 20px;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(-110vh); opacity: 0; }
    }

    button {
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 30px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .yes {
      background: #ff4d88;
      color: white;
    }

    .no {
      background: white;
      color: #ff4d88;
    }

    button:hover {
      transform: scale(1.05);
    }

    #result {
      margin-top: 20px;
      font-size: 22px;
      font-family: 'Great Vibes', cursive;
      color: pink;
    }
  </style>
</head>

<body>

<div class="overlay">
  <h1 class="pulse">Султанчик-llovvvveeeee 💖</h1>
  <p>Сайт қалай,Ереке? 🥹</p>

  <h2 style="font-family: 'Playfair Display', serif; margin-top: 25px;">
    Сен мени жақсы көресің бе? 💕
  </h2>

  <div>
    <button class="yes" onclick="yesLove()">Иә 💖</button>
    <button class="no" onclick="noLove()">Жоқ 💔</button>
  </div>

  <p id="result"></p>
</div>

<script>
function yesLove() {
  document.getElementById("result").innerHTML =
    "Мен де сені жақсы көремін 💞🥹";
}

function noLove() {
  document.getElementById("result").innerHTML =
    "…💔 бәрібір мен сені жақсы көремін";
}

/* 💗 сердечки */
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💗";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
