<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Наша любовь 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    min-height: 100vh;
    overflow-x: hidden;
    background: url("assets/WhatsApp Image 2026-04-17 at 14.06.21.jpeg") no-repeat center/cover;
    font-family: 'Playfair Display', serif;
  }

  .overlay {
    padding: 40px;
    border-radius: 25px;
    color: white;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    text-align: center;
    width: fit-content;
    margin: 80px auto;
  }

  h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 80px;
    text-shadow: 0 0 20px pink;
  }

  button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
  }

  .yes {
    background: #ff4d88;
    color: white;
  }

  .no {
    background: white;
    color: #ff4d88;
  }

  #result {
    margin-top: 15px;
    font-size: 22px;
    color: pink;
    font-family: 'Great Vibes', cursive;
  }

  /* 💍 финал экран */
  #loveScreen {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    color: white;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 9999;
    font-size: 40px;
    font-family: 'Great Vibes', cursive;
    text-shadow: 0 0 25px pink;
  }

  /* 💗 сердечки */
  .heart {
    position: absolute;
    bottom: -20px;
    font-size: 20px;
    color: pink;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-110vh); opacity: 0; }
  }

  /* 💥 фейерверк */
  .firework {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: pink;
    animation: explode 1s ease-out forwards;
    z-index: 9998;
  }

  @keyframes explode {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(25); opacity: 0; }
  }

  /* 💖 НОВЫЙ КЛИП-БЛОК ВНИЗУ */
  .clip-stage {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
    margin-top: 100px;
  }

  .clip-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("assets/36.jpeg") center/cover no-repeat;
    filter: brightness(0.5);
    animation: zoom 10s ease-in-out infinite alternate;
  }

  .clip-text {
    position: relative;
    z-index: 2;
    color: white;
  }

  .clip-text h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 90px;
    text-shadow: 0 0 25px pink;
    animation: pulse 2.5s infinite;
  }

  @keyframes zoom {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
  }

  @keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.08);}
    100% {transform: scale(1);}
  }

</style>
</head>

<body>

<!-- 💖 ОСНОВНОЙ БЛОК -->
<div class="overlay">

  <h1>Султанчик-lllooovveeeee 💖</h1>
  <p>do u want me, bbaaabbeeeee? 🥹</p>

  <h2>ұялмай айта бер 💕</h2>

  <button class="yes" onclick="yesLove()">Да 💖</button>
  <button class="no">Нет 💔</button>

  <p id="result"></p>
</div>

<!-- 💍 ФИНАЛ -->
<div id="loveScreen">
  білем ғой сенің оооо иииесссс дейтініңді 💖
</div>

<!-- 💖 КЛИП-БЛОК ВНИЗУ -->
<div class="clip-stage">
  <div class="clip-bg"></div>
  <div class="clip-text">
    <h1>всегда говори мне да 💖</h1>
  </div>
</div>

<!-- 🎵 СКРИПТОНИТ -->
<div style="display:none;">
  <iframe
    width="0"
    height="0"
    src="https://www.youtube.com/embed/6xMw5N7_spo?start=16&autoplay=1&loop=1&playlist=6xMw5N7_spo"
    allow="autoplay">
  </iframe>
</div>

<script>

function yesLove() {
  document.getElementById("loveScreen").style.display = "flex";
  document.getElementById("result").innerHTML = "💖 теперь мы вместе 💖";
  startFireworks();
}

/* 💗 сердечки */
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💗";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 200);

/* 💥 фейерверк */
function startFireworks() {
  for (let i = 0; i < 60; i++) {
    const fw = document.createElement("div");
    fw.className = "firework";

    fw.style.left = Math.random() * 100 + "vw";
    fw.style.top = Math.random() * 100 + "vh";

    document.body.appendChild(fw);

    setTimeout(() => fw.remove(), 1000);
  }
}

</script>

</body>
</html>
