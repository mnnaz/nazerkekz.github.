<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Наша любовь 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: url("assets/WhatsApp Image 2026-04-17 at 14.06.21.jpeg") no-repeat center/cover;
  }

  .overlay {
    padding: 40px;
    border-radius: 25px;
    color: white;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
  }

  h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 80px;
    text-shadow: 0 0 20px pink;
  }

  p, h2 {
    font-family: 'Playfair Display', serif;
  }

  button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
  }

  .yes {
    background: #ff4d88;
    color: white;
  }

  .no {
    background: white;
    color: #ff4d88;
  }

  #result {
    margin-top: 15px;
    font-size: 22px;
    font-family: 'Great Vibes', cursive;
    color: pink;
  }

  /* 💗 сердечки */
  .heart {
    position: absolute;
    bottom: -20px;
    font-size: 20px;
    color: pink;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-110vh); opacity: 0; }
  }

  /* 💍 финальный экран */
  #loveScreen {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    justify-content: center;
    align-items: center;
    z-index: 9999;
    color: white;
    font-size: 48px;
    font-family: 'Great Vibes', cursive;
    text-shadow: 0 0 25px pink;
  }

  /* 💥 фейерверк */
  .firework {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: pink;
    animation: explode 1s ease-out forwards;
    z-index: 9998;
  }

  @keyframes explode {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(25); opacity: 0; }
  }
</style>
</head>

<body>

<div class="overlay">
  <h1>Султанчик-lllooovveeeee💖</h1>
  <p>do u want me, bbaaabbeeeee? 🥹</p>

  <h2>ұялмай айта бер 💕</h2>

  <button class="yes" onclick="yesLove()">Да 💖</button>
  <button class="no" onclick="noLove()">Нет 💔</button>

  <p id="result"></p>
</div>

<!-- 💍 финальный экран -->
<div id="loveScreen">
  білем ғой сенің оооо иииесссс дейтініңді<br>
   💖
</div>

<!-- 🎵 INSOMNIA AKHA -->
<div style="display:none;">
  <iframe 
    id="music"
    width="0"
    height="0"
    src="https://www.youtube.com/embed/lUz4R5rNzsU?autoplay=1&loop=1&playlist=lUz4R5rNzsU"
    allow="autoplay">
  </iframe>
</div>

<script>

function yesLove() {
  document.getElementById("loveScreen").style.display = "flex";
  document.getElementById("result").innerHTML = "💖 теперь мы вместе 💖";

  startFireworks();

  // 🎵 музыка
  const music = document.getElementById("music");
  if (music) {
    music.src = music.src;
  }
}

/* 💔 кнопка убегает */
const noBtn = document.querySelector(".no");

noBtn.addEventListener("mouseover", () => {
  noBtn.style.position = "absolute";
  noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 100) + "px";
});

/* 💗 сердечки */
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💗";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 200);

/* 💥 фейерверк */
function startFireworks() {
  for (let i = 0; i < 60; i++) {
    const fw = document.createElement("div");
    fw.className = "firework";

    fw.style.left = Math.random() * 100 + "vw";
    fw.style.top = Math.random() * 100 + "vh";

    fw.style.background = Math.random() > 0.5 ? "pink" : "white";

    document.body.appendChild(fw);

    setTimeout(() => fw.remove(), 1000);
  }
}

</script>

</body>
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>всегда говори мне да 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: black;
}

/* 🎬 фон */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("assets/36.jpeg") center/cover no-repeat;
  filter: brightness(0.45);
  transform: scale(1.1);
  animation: zoom 10s ease-in-out infinite alternate;
}

@keyframes zoom {
  from {transform: scale(1.05);}
  to {transform: scale(1.15);}
}

/* 💖 текст */
.center {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  color: white;
  z-index: 2;
}

.center h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 100px;
  text-shadow: 0 0 25px pink;
  animation: pulse 2.5s infinite;
}

.center p {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  opacity: 0.9;
}

/* ✨ анимации */
@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.08);}
  100% {transform: scale(1);}
}

/* 💗 сердечки */
.heart {
  position: absolute;
  bottom: -20px;
  font-size: 20px;
  color: pink;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from {transform: translateY(0); opacity: 1;}
  to {transform: translateY(-110vh); opacity: 0;}
}

/* 🎬 интро */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
  color: white;
  cursor: pointer;
}

#intro h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 50px;
  text-shadow: 0 0 20px pink;
}

#intro p {
  font-family: 'Playfair Display', serif;
  opacity: 0.7;
}

</style>
</head>

<body>

<!-- 🎬 ИНТРО -->
<div id="intro" onclick="start()">
  <h1>нажми чтобы начать 💖</h1>
  <p>всегда говори мне да</p>
</div>

<!-- 💖 ОСНОВА -->
<div class="bg"></div>

<div class="center">
  <h1>всегда говори мне да 💖</h1>
  <p>и это уже не вопрос… это чувство</p>
</div>

<!-- 🎵 музыка -->
<div id="music"></div>

<script>

/* 💖 старт */
function start() {
  document.getElementById("intro").style.display = "none";

  const iframe = document.createElement("iframe");
  iframe.width = 0;
  iframe.height = 0;
  iframe.src = "https://www.youtube.com/embed/6xMw5N7_spo?start=16&autoplay=1&loop=1&playlist=6xMw5N7_spo";
  iframe.allow = "autoplay";

  document.body.appendChild(iframe);
}

/* 💗 сердечки */
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💗";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 150);

</script>

</body>
</html>
