<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Наша любовь 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: url("assets/WhatsApp Image 2026-04-17 at 14.06.21.jpeg") no-repeat center/cover;
  }

  /* 🌫 стекло */
  .overlay {
    padding: 40px;
    border-radius: 25px;
    color: white;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    z-index: 10;
  }

  h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 80px;
    text-shadow: 0 0 20px pink;
  }

  p, h2 {
    font-family: 'Playfair Display', serif;
  }

  button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
  }

  .yes {
    background: #ff4d88;
    color: white;
  }

  .no {
    background: white;
    color: #ff4d88;
  }

  #result {
    margin-top: 15px;
    font-size: 22px;
    font-family: 'Great Vibes', cursive;
    color: pink;
  }

  /* 💗 сердечки */
  .heart {
    position: absolute;
    bottom: -20px;
    font-size: 20px;
    color: pink;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-110vh); opacity: 0; }
  }

  /* 💌 финал */
  #loveScreen {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    justify-content: center;
    align-items: center;
    z-index: 9999;
    color: white;
    font-size: 48px;
    font-family: 'Great Vibes', cursive;
    text-shadow: 0 0 25px pink;
  }

  /* 💥 СВАДЕБНЫЙ ФЕЙЕРВЕРК */
  .firework {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: pink;
    animation: explode 1s ease-out forwards;
    z-index: 9998;
  }

  @keyframes explode {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(25); opacity: 0; }
  }
</style>
</head>

<body>

<div class="overlay">
  <h1>Султанчик 💖</h1>
  <p>Как тебе сайт? 🥹</p>

  <h2>Ты меня любишь? 💕</h2>

  <button class="yes" onclick="yesLove()">Да 💖</button>
  <button class="no" onclick="noLove()">Нет 💔</button>

  <p id="result"></p>
</div>

<!-- 💌 финальный экран -->
<div id="loveScreen">
  Я знал(а) это 💞<br>
  Я тоже тебя люблю 💖
</div>

<script>

/* 💖 YES */
function yesLove() {
  document.getElementById("loveScreen").style.display = "flex";
  document.getElementById("result").innerHTML = "💖 теперь мы вместе 💖";

  startFireworks();
}

/* 💔 NO убегает */
const noBtn = document.querySelector(".no");

noBtn.addEventListener("mouseover", () => {
  noBtn.style.position = "absolute";
  noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 100) + "px";
});

/* 💗 сердечки */
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💗";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 200);

/* 💥 СВАДЕБНЫЙ ФЕЙЕРВЕРК */
function startFireworks() {
  for (let i = 0; i < 60; i++) {
    const fw = document.createElement("div");
    fw.className = "firework";

    fw.style.left = Math.random() * 100 + "vw";
    fw.style.top = Math.random() * 100 + "vh";

    fw.style.background = Math.random() > 0.5 ? "pink" : "white";

    document.body.appendChild(fw);

    setTimeout(() => fw.remove(), 1000);
  }

  setInterval(() => {
    const fw = document.createElement("div");
    fw.className = "firework";
    fw.style.left = Math.random() * 100 + "vw";
    fw.style.top = Math.random() * 100 + "vh";
    document.body.appendChild(fw);
    setTimeout(() => fw.remove(), 1000);
  }, 300);
}

</script>

</body>
</html>
