<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ВСЕ ЧТО Я ЛЮБЛЮ</title>

<!-- Красивый шрифт -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    min-height:100vh;
    background-image: url("background.jpg");
    background-size: cover;
    background-position: center;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    font-family: 'Pacifico', cursive;
}

/* затемнение */
.overlay{
    width:100%;
    min-height:100vh;
    background: rgba(0,0,0,0.55);
    display:flex;
    justify-content:center;
}

/* блок заголовка */
.title-box{
    margin-top:60px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    padding:30px 50px;
    border-radius:25px;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h1{
    font-size:48px;
    color:white;
    margin:0;
}

</style>
</head>

<body>

<div class="overlay">
  <div class="title-box">
    <h1>ВСЕ ЧТО Я ЛЮБЛЮ ❤️❤️</h1>
  </div>
</div>

</body>
</html>
