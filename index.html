<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ВСЕ ЧТО Я ЛЮБЛЮ</title>

<!-- Романтичный шрифт -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family: 'Great Vibes', cursive;
}

/* блок с картинкой */
.hero{
    width:100%;
    height:75vh;   /* уменьшили фото */
    background-image: url("assets/г5.jpeg");
    background-size: cover;
    background-position: center top;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

/* лёгкий тёмный слой */
.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background: rgba(0,0,0,0.25);
}

/* романтичный текст */
.title{
    position:relative;
    font-size:52px;
    color:#fff0f6;

    letter-spacing:4px;

    text-shadow:
      0 0 8px #ffb6d9,
      0 0 15px #ff8fc7,
      0 0 30px #ff69b4;
}

</style>
</head>

<body>

<div class="hero">
    <div class="title">❤️ ВСЕ ЧТО Я ЛЮБЛЮ ❤️</div>
</div>

</body>
</html>
