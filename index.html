<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ВСЕ ЧТО Я ЛЮБЛЮ</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family: 'Pacifico', cursive;
}

/* блок с картинкой */
.hero{
    width:100%;
    height:90vh;
    background-image: url("assets/г4.jpeg");
    background-size: cover;
    background-position: top;
    display:flex;
    align-items:flex-start;
    justify-content:center;
}

/* красивый текст */
.title{
    margin-top:40px;
    font-size:42px;
    color:#ffffff;

    /* обводка букв */
    -webkit-text-stroke: 1.2px #ff5fa2;

    /* свечение */
    text-shadow:
      0 0 5px #ff9ad5,
      0 0 10px #ff69b4,
      0 0 20px #ff69b4;

    letter-spacing:3px;
}

</style>
</head>

<body>

<div class="hero">
    <div class="title">❤️ ВСЕ ЧТО Я ЛЮБЛЮ ❤️</div>
</div>

</body>
</html>
