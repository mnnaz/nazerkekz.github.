<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ВСЕ ЧТО Я ЛЮБЛЮ</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family: 'Pacifico', cursive;
}

/* блок с картинкой */
.hero{
    width:100%;
    height:90vh;
    background-image: url("assets/г1.jpeg");
    background-repeat: no-repeat;
    background-size: cover;
    background-position: top;
    position: relative;
}

/* лёгкое затемнение */
.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background: rgba(0,0,0,0.35);
}

/* контейнер заголовка */
.title{
    position:absolute;
    top:30%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:1;

    padding:16px 38px;
    border-radius:40px;

    background: rgba(0,0,0,0.35);
    border:2px solid rgba(255,255,255,0.6);

    color:white;
    font-size:32px;
    letter-spacing:2px;
    text-align:center;

    box-shadow: 
        0 0 10px rgba(255,105,180,0.6),
        0 0 25px rgba(255,105,180,0.4);

    text-shadow:
        0 0 5px #ff9ad5,
        0 0 10px #ff69b4,
        0 0 20px #ff69b4;
}

</style>
</head>

<body>

<div class="hero">
    <div class="title">ВСЕ ЧТО Я ЛЮБЛЮ ❤️❤️</div>
</div>

</body>
</html>
