<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Наша любовь 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: url("assets/WhatsApp Image 2026-04-17 at 14.06.21.jpeg") no-repeat center/cover;
  }

  .overlay {
    padding: 40px;
    border-radius: 25px;
    color: white;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
  }

  h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 80px;
    text-shadow: 0 0 20px pink;
  }

  p, h2 {
    font-family: 'Playfair Display', serif;
  }

  button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
  }

  .yes {
    background: #ff4d88;
    color: white;
  }

  .no {
    background: white;
    color: #ff4d88;
  }

  #result {
    margin-top: 15px;
    font-size: 22px;
    font-family: 'Great Vibes', cursive;
    color: pink;
  }

  /* 💗 сердечки */
  .heart {
    position: absolute;
    bottom: -20px;
    font-size: 20px;
    color: pink;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-110vh); opacity: 0; }
  }

  /* 💍 финальный экран */
  #loveScreen {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    justify-content: center;
    align-items: center;
    z-index: 9999;
    color: white;
    font-size: 48px;
    font-family: 'Great Vibes', cursive;
    text-shadow: 0 0 25px pink;
  }

  /* 💥 фейерверк */
  .firework {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: pink;
    animation: explode 1s ease-out forwards;
    z-index: 9998;
  }

  @keyframes explode {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(25); opacity: 0; }
  }
</style>
</head>

<body>

<div class="overlay">
  <h1>Султанчик-lllooovveeeee💖</h1>
  <p>do u want me, bbaaabbeeeee? 🥹</p>

  <h2>ұялмай айта бер 💕</h2>

  <button class="yes" onclick="yesLove()">Да 💖</button>
  <button class="no" onclick="noLove()">Нет 💔</button>

  <p id="result"></p>
</div>

<!-- 💍 финальный экран -->
<div id="loveScreen">
  білем ғой сенің оооо иииесссс дейтініңді<br>
   💖
</div>

<!-- 🎵 INSOMNIA AKHA -->
<div style="display:none;">
  <iframe 
    id="music"
    width="0"
    height="0"
    src="https://www.youtube.com/embed/lUz4R5rNzsU?autoplay=1&loop=1&playlist=lUz4R5rNzsU"
    allow="autoplay">
  </iframe>
</div>

<script>

function yesLove() {
  document.getElementById("loveScreen").style.display = "flex";
  document.getElementById("result").innerHTML = "💖 теперь мы вместе 💖";

  startFireworks();

  // 🎵 музыка
  const music = document.getElementById("music");
  if (music) {
    music.src = music.src;
  }
}

/* 💔 кнопка убегает */
const noBtn = document.querySelector(".no");

noBtn.addEventListener("mouseover", () => {
  noBtn.style.position = "absolute";
  noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 100) + "px";
});

/* 💗 сердечки */
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💗";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 200);

/* 💥 фейерверк */
function startFireworks() {
  for (let i = 0; i < 60; i++) {
    const fw = document.createElement("div");
    fw.className = "firework";

    fw.style.left = Math.random() * 100 + "vw";
    fw.style.top = Math.random() * 100 + "vh";

    fw.style.background = Math.random() > 0.5 ? "pink" : "white";

    document.body.appendChild(fw);

    setTimeout(() => fw.remove(), 1000);
  }
}

</script>

</body>
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>final love 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: black;
}

/* 🎬 кино-фон */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("assets/36.jpeg") center/cover no-repeat;
  filter: brightness(0.45) contrast(1.1);
  transform: scale(1.05);
  animation: slowZoom 12s ease-in-out infinite alternate;
}

/* 🌙 мягкий zoom как в фильмах */
@keyframes slowZoom {
  from { transform: scale(1.05); }
  to { transform: scale(1.15); }
}

/* 💖 центр текст */
.center {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 2;
  flex-direction: column;
  color: white;
  animation: fadeIn 2s ease;
}

/* 💖 главный текст */
.center h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 100px;
  text-shadow: 0 0 25px pink, 0 0 60px rgba(255,105,180,0.6);
  animation: pulse 2.5s infinite;
}

/* 💌 подпись */
.center p {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  opacity: 0.9;
}

/* ✨ появление */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 💖 пульс */
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* 💗 сердечки */
.heart {
  position: absolute;
  bottom: -20px;
  font-size: 20px;
  color: pink;
  animation: floatUp linear infinite;
  z-index: 3;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-110vh); opacity: 0; }
}

/* 🎬 лёгкий “шум кино” */
.noise {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("https://grainy-gradients.vercel.app/noise.svg");
  opacity: 0.08;
  z-index: 1;
  pointer-events: none;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="noise"></div>

<div class="center">
  <h1>всегда говори мне да 💖</h1>
  <p>и это уже не фраза… это судьба</p>
</div>

<!-- 🎵 Скриптонит -->
<div style="display:none;">
  <iframe
    width="0"
    height="0"
    src="https://www.youtube.com/embed/6xMw5N7_spo?start=16&autoplay=1&loop=1&playlist=6xMw5N7_spo"
    allow="autoplay">
  </iframe>
</div>

<script>

/* 💗 сердечки */
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💗";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 150);

</script>

</body>
</html>
