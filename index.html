<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Наша любовь 💕</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;

      background: url("assets/WhatsApp Image 2026-04-17 at 14.06.21.jpeg") no-repeat center/cover;
    }

    .overlay {
      padding: 40px;
      border-radius: 20px;
      color: white;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      z-index: 2;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 85px;
      margin-bottom: 10px;

      animation: fadeIn 2s ease;

      text-shadow: 
        0 0 10px rgba(255,255,255,0.9),
        0 0 20px pink;
    }

    p {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      animation: fadeIn 3s ease;
    }

    /* 💫 появление */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 💗 пульсация */
    .pulse {
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* 💖 сердечки */
    .heart {
      position: absolute;
      bottom: -20px;
      color: pink;
      font-size: 20px;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0);
        opacity: 1;
      }
      to {
        transform: translateY(-110vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<div class="overlay">
  <h1 class="pulse">Султанчик-llovvvveeeee 💖</h1>
  <p>Сайт қалай,Ереке? 🥹</p>
</div>

<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💗";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
<div class="overlay">

  <p style="font-size:24px; margin-bottom:20px;">
    do u want me? 🫶💖
  </p>

  <button onclick="yes()" style="
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:20px;
    background:pink;
    color:white;
    font-size:16px;
    cursor:pointer;
  ">
    Да 💖
  </button>

  <button onclick="no()" style="
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:20px;
    background:white;
    color:pink;
    font-size:16px;
    cursor:pointer;
  ">
    Нет 😌
  </button>

  <p id="answer" style="margin-top:15px; font-size:20px;"></p>

</div>

<script>
function yes() {
  document.getElementById("answer").innerHTML = "білем ғой сенің иееесссс дейтініңді 💖🥹";
}

function no() {
  document.getElementById("answer").innerHTML = "қызық болғасын бастын ба ааааа , жоқ десең көтсің 😭💔";
}
</script>
