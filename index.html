<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Наша любовь 💕</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;

      background: url("assets/WhatsApp Image 2026-04-17 at 14.06.21.jpeg") no-repeat center/cover;
    }

    .overlay {
      padding: 40px;
      border-radius: 20px;
      color: white;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      z-index: 2;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 80px;
      margin-bottom: 10px;
      animation: fadeIn 2s ease;
      text-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 20px pink;
    }

    p {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      margin-top: 20px;
    }

    button {
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 30px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .yes {
      background: #ff4d88;
      color: white;
    }

    .no {
      background: white;
      color: #ff4d88;
    }

    button:hover {
      transform: scale(1.05);
    }

    #result {
      margin-top: 15px;
      font-size: 22px;
      font-family: 'Great Vibes', cursive;
      color: pink;
    }

    /* 💗 сердечки */
    .heart {
      position: absolute;
      bottom: -20px;
      color: pink;
      font-size: 20px;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(-110vh); opacity: 0; }
    }

    /* 💌 финальный экран */
    #loveScreen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 9999;
    }

    #loveScreen div {
      color: white;
      font-size: 42px;
      font-family: 'Great Vibes', cursive;
      text-shadow: 0 0 20px pink;
    }
  </style>
</head>

<body>

<!-- 💖 основной экран -->
<div class="overlay">
  <h1>Султанчик 💖</h1>
  <p>Как тебе сайт? 🥹</p>

  <h2>Ты меня любишь? 💕</h2>

  <div>
    <button class="yes" onclick="yesLove()">Да 💖</button>
    <button class="no" onclick="noLove()">Нет 💔</button>
  </div>

  <p id="result"></p>
</div>

<!-- 💌 финальный экран -->
<div id="loveScreen">
  <div>
    Я знал(а) это 💞<br><br>
    Я тоже тебя люблю 💖
  </div>
</div>

<script>
function yesLove() {
  document.getElementById("loveScreen").style.display = "flex";
  document.getElementById("result").innerHTML =
    "💖 теперь мы вместе 💖";
}

function noLove() {
  document.getElementById("result").innerHTML =
    "…💔 но я всё равно люблю тебя";
}

/* 💔 кнопка убегает */
const noBtn = document.querySelector(".no");

noBtn.addEventListener("mouseover", function () {
  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * (window.innerHeight - 120);

  noBtn.style.position = "absolute";
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

/* 💗 сердечки */
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💗";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 250);
</script>

</body>
</html>
